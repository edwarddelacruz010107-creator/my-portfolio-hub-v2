<!--
  app/templates/auth/verify_email_result.html — legacy token-link result page.

  Reachable only via /auth/verify-email/<token> links sent before the
  OTP switchover (v3.10). register() no longer issues these tokens; this
  page exists purely so an already-delivered link doesn't 404 or blank-page.
  Same self-contained-document fix as verify_email_sent.html — does NOT
  extend base.html (that was the root cause of the original blank page).
-->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ 'Email verified' if ok else 'Verification failed' }} — Portfolio Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design-system.css', v='20260714-v3') }}">  <script nonce="{{ csp_nonce() if csp_nonce is defined else '' }}" src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>
  <style nonce="{{ csp_nonce() if csp_nonce is defined else '' }}">
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #060810; color: #e8eaf0; font-family: 'DM Sans', sans-serif; padding: 2rem;
    }
    .card {
      max-width: 420px; width: 100%; background: #0d1117; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px; box-shadow: 0 32px 80px rgba(0,0,0,0.55); padding: 2.75rem 2.5rem; text-align: center;
    }
    .icon {
      width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 1.5rem; display: grid; place-items: center;
      background: {{ 'rgba(16,185,129,0.12)' if ok else 'rgba(239,68,68,0.12)' }};
      border: 1px solid {{ 'rgba(16,185,129,0.3)' if ok else 'rgba(239,68,68,0.3)' }};
      color: {{ '#6ee7b7' if ok else '#fca5a5' }};
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; margin: 0 0 0.5rem; }
    p { color: #8892a4; font-size: 0.9rem; line-height: 1.55; margin: 0 0 1.75rem; }
    a.btn {
      display: block; padding: 0.85rem; border-radius: 10px; text-decoration: none;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: #fff;
      font-weight: 700; font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <iconify-icon icon="{{ 'lucide:check-circle' if ok else 'lucide:x-circle' }}" width="26"></iconify-icon>
    </div>
    {% if ok %}
      <h1>Email verified</h1>
      <p>Your email is now verified. You can sign in to your account.</p>
      <a class="btn" href="{{ url_for('auth.login') }}">Sign in</a>
    {% else %}
      <h1>Verification failed</h1>
      <p>This link is invalid or expired. Sign in and we'll send you a fresh verification code.</p>
      <a class="btn" href="{{ url_for('auth.login') }}">Back to sign in</a>
    {% endif %}
  </div>
</body>
</html>
