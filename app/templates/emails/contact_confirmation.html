<div style="font-family:Arial,Helvetica,sans-serif;max-width:680px;margin:auto;padding:24px;background:#fff;color:#111;">
  <h2 style="margin-top:0;color:#111;">Thanks for contacting us</h2>
  <p>Hi {{ name }},</p>
  <p>Thanks for your message. We’ll reply within one business day. Below is a copy of your submission:</p>
  <hr />
  <p><strong>Subject:</strong> {{ subject }}</p>
  <div style="white-space:pre-wrap;color:#333;">{{ message }}</div>
  <hr />
  <p style="font-size:12px;color:#666">If you need immediate assistance, reply to this email or visit our Help Center.</p>
</div>
