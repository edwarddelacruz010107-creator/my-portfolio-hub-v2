<div style="font-family:Arial,Helvetica,sans-serif;max-width:680px;margin:auto;padding:24px;background:#fff;color:#111;">
  <h2 style="margin-top:0;color:#111;">New contact form message</h2>
  <p><strong>From:</strong> {{ name }} &lt;{{ email }}&gt;</p>
  <p><strong>Subject:</strong> {{ subject }}</p>
  <hr />
  <div style="white-space:pre-wrap;color:#333;">{{ message }}</div>
  <hr />
  <p style="font-size:12px;color:#666">IP: {{ ip_address }} &bull; Source: {{ source_page }}</p>
</div>
