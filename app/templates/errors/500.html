<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 — Server Error</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    :root {
      --bg:#080a0f;--bg-2:#12161e;--text:#e8eaf0;--text-muted:#7a8094;
      --accent:#6366f1;--accent-light:#818cf8;--accent-glow:rgba(99,102,241,0.25);
      --border:rgba(255,255,255,0.07);--border-light:rgba(255,255,255,0.12);
      --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
      --transition:0.25s cubic-bezier(0.4,0,0.2,1);
    }
    html[data-theme="light"]{--bg:#f8fafc;--bg-2:#ffffff;--text:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;--border:rgba(15,23,42,0.08);--border-light:rgba(15,23,42,0.12);--accent-glow:rgba(99,102,241,0.1);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased;overflow:hidden;position:relative;}
    .bg-orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);}
    .bg-orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%);top:-200px;right:-100px;animation:orbDrift 18s ease-in-out infinite;}
    .bg-orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(139,92,246,0.08) 0%,transparent 70%);bottom:-100px;left:-80px;animation:orbDrift 24s ease-in-out infinite reverse;}
    @keyframes orbDrift{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
    .error-wrap{max-width:520px;width:100%;position:relative;z-index:1;}
    .error-icon-wrap{width:80px;height:80px;border-radius:22px;margin:0 auto 2rem;display:grid;place-items:center;color:var(--accent-light);}
    .error-code{font-family:var(--font-display);font-size:clamp(5rem,15vw,9rem);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent-light),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem;letter-spacing:-0.03em;}
    h1{font-family:var(--font-display);font-size:1.6rem;font-weight:800;color:var(--text);margin-bottom:0.85rem;letter-spacing:-0.02em;}
    p{color:var(--text-muted);font-size:0.975rem;line-height:1.7;margin-bottom:2.25rem;max-width:400px;margin-left:auto;margin-right:auto;}
    .btn-group{display:flex;gap:0.85rem;justify-content:center;flex-wrap:wrap;}
    .btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.8rem 1.6rem;border-radius:12px;font-family:var(--font-display);font-weight:700;font-size:0.9rem;text-decoration:none;transition:all var(--transition);letter-spacing:0.01em;}
    .btn-primary{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;box-shadow:0 4px 20px var(--accent-glow);}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow);}
    .btn-ghost{background:var(--bg-2);border:1px solid var(--border-light);color:var(--text-muted);}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent-light);transform:translateY(-1px);}
    .theme-toggle{position:fixed;top:1.25rem;right:1.25rem;width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);display:grid;place-items:center;color:var(--text-muted);cursor:pointer;transition:all var(--transition);z-index:100;backdrop-filter:blur(8px);}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent-light);background:rgba(99,102,241,0.1);}

    .error-icon-wrap{background:rgba(239,68,68,0.1);border:1px solid rgbaa(f87171; }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <iconify-icon icon="lucide:moon" width="16" id="moonIcon"></iconify-icon>
    <iconify-icon icon="lucide:sun" width="16" id="sunIcon" style="display:none"></iconify-icon>
  </button>
  <div class="error-wrap">
    <div class="error-icon-wrap">
      <iconify-icon icon="lucide:server-off" width="36" style="color:#f87171"></iconify-icon>
    </div>
    <div class="error-code">500</div>
    <h1>Internal Server Error</h1>
    <p>Something went wrong on our end. We're working to fix it. Please try again in a moment or contact support if the issue persists.</p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        <iconify-icon icon="lucide:home" width="15"></iconify-icon>
        Go Home
      </a>
      <a href="javascript:history.back()" class="btn btn-ghost">
        <iconify-icon icon="lucide:arrow-left" width="15"></iconify-icon>
        Go Back
      </a>
    </div>
  </div>
  <script>
    const THEME_KEY='portfolio-theme';
    function initTheme(){const t=localStorage.getItem(THEME_KEY)||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('moonIcon').style.display=t==='dark'?'inline-block':'none';document.getElementById('sunIcon').style.display=t==='light'?'inline-block':'none';}
    function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');const next=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',next);localStorage.setItem(THEME_KEY,next);document.getElementById('moonIcon').style.display=next==='dark'?'inline-block':'none';document.getElementById('sunIcon').style.display=next==='light'?'inline-block':'none';}
    initTheme();
</script>
</body>
</html>
