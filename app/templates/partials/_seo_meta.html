{# Expects a plain `_seo` dict from app.services.seo. #}
<title>{{ _seo.title }}</title>
<meta name="description" content="{{ _seo.description }}">
<meta name="robots" content="{{ _seo.robots }}">
<link rel="canonical" href="{{ _seo.canonical }}">
<meta property="og:locale" content="en_US">
<meta property="og:type" content="{{ _seo.og_type }}">
<meta property="og:site_name" content="MyPortfolioHub">
<meta property="og:title" content="{{ _seo.title }}">
<meta property="og:description" content="{{ _seo.description }}">
<meta property="og:url" content="{{ _seo.canonical }}">
{% if _seo.image %}
<meta property="og:image" content="{{ _seo.image }}">
<meta property="og:image:secure_url" content="{{ _seo.image }}">
<meta property="og:image:alt" content="{{ _seo.image_alt }}">
{% endif %}
<meta name="twitter:card" content="{{ 'summary_large_image' if _seo.image else 'summary' }}">
<meta name="twitter:title" content="{{ _seo.title }}">
<meta name="twitter:description" content="{{ _seo.description }}">
{% if _seo.image %}<meta name="twitter:image" content="{{ _seo.image }}">{% endif %}
{% if _seo.graph %}
<script type="application/ld+json"{% if csp_nonce is defined %} nonce="{{ csp_nonce() }}"{% endif %}>{{ _seo.graph | tojson }}</script>
{% endif %}
