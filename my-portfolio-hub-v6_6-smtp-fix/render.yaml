# render.yaml — Portfolio CMS v5.3 PRODUCTION-READY (PATCHED)
# ═══════════════════════════════════════════════════════════════
# FIXES vs. v5.0 render.yaml:
#
#   [CRITICAL] preDeployCommand now runs `flask create-superadmin`
#              so a superadmin user exists BEFORE the app starts.
#              Without this, all production logins fail with
#              "Invalid credentials" on fresh deployments.
#
#   [HIGH]     SUPERADMIN_USERNAME + SUPERADMIN_EMAIL added as
#              explicit env vars (set in Render dashboard).
#              SUPERADMIN_PASSWORD should be set, then removed after
#              first login and password rotation.
#
#   [HIGH]     PAYMONGO_ENABLED=false explicitly set. The patched
#              config.py no longer requires PAYMONGO_SECRET_KEY /
#              PAYMONGO_WEBHOOK_SECRET when billing is disabled.
#
#   [MED]      Ordered preDeployCommand steps correctly:
#              1. db upgrade (core schema)
#              2. ensure-tenant-schema (tenant DB tables)
#              3. ensure-default-tenant (tenant + profile rows)
#              4. create-superadmin (auth user — THE CRITICAL STEP)

services:
  - type: web
    name: portfolio-cms
    runtime: python
    buildCommand: pip install -r requirements.txt

    # ── Deployment sequence — ORDER MATTERS ─────────────────────────
    # Step 1: Apply all pending core DB migrations
    # Step 2: Create tenant-bound tables on TENANT_DATABASE_URL
    # Step 3: Ensure 'default' Tenant row + Profile exist
    # Step 4: Create superadmin user (CRITICAL — was missing before)
    #
    # All commands are idempotent — safe to run on every deploy.
    # If SUPERADMIN_PASSWORD is set as an env var, it is used.
    # If absent, a secure password is auto-generated and printed to
    # the Render deploy log — capture it before the log scrolls away.
    preDeployCommand: >
      flask db upgrade &&
      flask ensure-tenant-schema &&
      flask ensure-default-tenant &&
      flask create-superadmin

    startCommand: >
      gunicorn
      --bind 0.0.0.0:$PORT
      --workers 1
      --threads 4
      --timeout 120
      --keep-alive 5
      --log-level info
      --access-logfile -
      --error-logfile -
      wsgi:app

    plan: starter
    autoDeploy: true
    healthCheckPath: /health

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: TOTP_VALID_WINDOW
        value: "1"

      # ── Redis ────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: portfolio-redis
          type: redis
          property: connectionString

      # ── Core secrets ─────────────────────────────────────────────
      - key: SECRET_KEY
        sync: false  # HIGH-05 FIX: never auto-rotate; set manually in Render dashboard
      - key: FERNET_KEY
        sync: false

      # ── Dual Database ────────────────────────────────────────────
      - key: CORE_DATABASE_URL
        sync: false
      - key: TENANT_DATABASE_URL
        sync: false

      # ── Superadmin bootstrap ─────────────────────────────────────
      # Set these in the Render dashboard.
      # After first login, change the password via the UI,
      # then REMOVE SUPERADMIN_PASSWORD from env vars.
      - key: SUPERADMIN_USERNAME
        value: superadmin
      - key: SUPERADMIN_EMAIL
        sync: false         # set your real admin email in Render dashboard
      - key: SUPERADMIN_PASSWORD
        sync: false         # set a strong password, remove after first login

      # ── Email — MailerSend ───────────────────────────────────────
      - key: MAILERSEND_API_KEY
        sync: false
      - key: MAILERSEND_FROM_EMAIL
        sync: false
      - key: MAILERSEND_FROM_NAME
        value: "Portfolio CMS"

      # ── Supabase (optional) ──────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false

      # ── App URL ──────────────────────────────────────────────────
      - key: APP_BASE_URL
        sync: false

      # ── Billing ──────────────────────────────────────────────────
      - key: BILLING_GRACE_PERIOD_DAYS
        value: "3"

      # FIX: PAYMONGO_ENABLED=false means PAYMONGO_SECRET_KEY and
      # PAYMONGO_WEBHOOK_SECRET are NOT required at startup.
      # Change to "true" and set the keys below when enabling billing.
      - key: PAYMONGO_ENABLED
        value: "false"
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false

      # ── Forms ────────────────────────────────────────────────────
      - key: WEB3FORMS_ACCESS_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # ── Scheduler ───────────────────────────────────────────────
      - key: ENABLE_SCHEDULER
        value: "true"

      # ── Monitoring ───────────────────────────────────────────────
      - key: BETTERSTACK_HEARTBEAT_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SELF_PING_ENABLED
        value: "true"
      - key: SELF_PING_INTERVAL
        value: "60"

  # ── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: portfolio-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
