worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;  # Never expose NGINX version

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 256;

  upstream portfolio_app {
    server web:8000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # ── MED-05 FIX: Security response headers at NGINX layer ─────────────────
    # Flask-Talisman covers HSTS + X-Content-Type-Options in app layer.
    # These complement at the transport layer and cover non-Flask responses.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── MED-05 FIX: Serve static files directly — bypass Gunicorn ────────────
    # Previously proxied to app — wastes worker slots for static assets.
    # Requires Docker volume mount: static/ → /app/static/
    location /static/ {
      alias /app/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # ── Dynamic application routes ────────────────────────────────────────────
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://portfolio_app;

      # Timeouts — prevent slow-loris and long-poll abuse
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
      internal;
      return 502 "Service temporarily unavailable";
    }
  }
}
