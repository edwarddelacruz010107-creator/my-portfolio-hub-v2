# render.yaml — Portfolio Hub canonical Docker production Blueprint
# ═══════════════════════════════════════════════════════════════
# FIXES vs. v5.0 render.yaml:
#
#   [CRITICAL] preDeployCommand now runs `flask create-superadmin`
#              so a superadmin user exists BEFORE the app starts.
#              Without this, all production logins fail with
#              "Invalid credentials" on fresh deployments.
#
#   [HIGH]     SUPERADMIN_USERNAME + SUPERADMIN_EMAIL added as
#              explicit env vars (set in Render dashboard).
#              SUPERADMIN_PASSWORD should be set, then removed after
#              first login and password rotation.
#
#   [HIGH]     PAYMONGO_ENABLED=false explicitly set. The patched
#              config.py no longer requires PAYMONGO_SECRET_KEY /
#              PAYMONGO_WEBHOOK_SECRET when billing is disabled.
#
#   [MED]      Ordered preDeployCommand steps correctly:
#              1. db-upgrade-all (locked core + tenant Alembic histories)
#              2. ensure-default-tenant (tenant + profile rows)
#              3. create-superadmin (auth user — THE CRITICAL STEP)

services:
  - type: web
    name: portfolio-cms
    runtime: docker
    dockerfilePath: ./Dockerfile

    # ── Deployment sequence — ORDER MATTERS ─────────────────────────
    # Step 1: Acquire the migration lock; migrate and verify both DB binds
    # Step 2: Ensure 'default' Tenant row + Profile exist
    # Step 3: Ensure the superadmin user exists (existing passwords are preserved)
    #
    # All commands are idempotent — safe to run on every deploy.
    # If SUPERADMIN_PASSWORD is set as an env var, it is used.
    # SUPERADMIN_PASSWORD is required only for first-time creation and is
    # never printed. Rotate it immediately if it has ever appeared in logs.
    preDeployCommand: >
      flask db-upgrade-all &&
      flask ensure-default-tenant &&
      flask create-superadmin

    # Inline ClamAV exceeds the 512 MiB Free/Starter limit. Standard provides
    # 2 GiB and is the minimum supported production tier for this image.
    plan: standard
    autoDeploy: true
    healthCheckPath: /readyz

    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: TOTP_VALID_WINDOW
        value: "1"
      # Render terminates TLS at exactly one trusted proxy hop.
      - key: TRUSTED_PROXY_HOPS
        value: "1"
      # Sensitive uploads fail closed once the scanner command is installed.
      - key: MALWARE_SCAN_REQUIRED
        value: "true"
      - key: MALWARE_SCANNER_COMMAND
        value: "clamscan --no-summary"
      - key: MALWARE_SCAN_TIMEOUT_SECONDS
        value: "45"
      - key: MALWARE_SIGNATURE_DIRECTORY
        value: "/var/lib/clamav"
      - key: MALWARE_SIGNATURE_MAX_AGE_HOURS
        value: "24"
      - key: CLAMAV_UPDATE_INTERVAL_SECONDS
        value: "21600"

      # ── Docker entrypoint controls ─────────────────────────────────
      # These are used when deploying with the Dockerfile.
      - key: RUN_MIGRATIONS
        value: "false"
      - key: USE_ORM_BOOTSTRAP_ON_STARTUP
        value: "false"
      - key: CREATE_SUPERADMIN_ON_STARTUP
        value: "false"
      - key: AUTO_ENSURE_TENANT_SCHEMA
        value: "false"
      - key: ALLOW_CREATE_ALL_BOOTSTRAP_ON_MIGRATION_FAILURE
        value: "false"

      # ── Redis ────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: portfolio-redis
          type: keyvalue
          property: connectionString

      # ── Core secrets ─────────────────────────────────────────────
      - key: SECRET_KEY
        sync: false  # HIGH-05 FIX: never auto-rotate; set manually in Render dashboard
      - key: FERNET_KEY
        sync: false

      # ── Database ─────────────────────────────────────────────────
      # Option 1: set CORE_DATABASE_URL to your single Render PostgreSQL URL.
      # TENANT_DATABASE_URL is optional; when omitted, tenant-bound tables use CORE_DATABASE_URL.
      - key: CORE_DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require

      # ── Superadmin bootstrap ─────────────────────────────────────
      # Set these in the Render dashboard.
      # After first login, change the password via the UI,
      # then REMOVE SUPERADMIN_PASSWORD from env vars.
      - key: SUPERADMIN_USERNAME
        value: superadmin
      - key: SUPERADMIN_EMAIL
        sync: false         # set your real admin email in Render dashboard
      - key: SUPERADMIN_PASSWORD
        sync: false         # set a strong password, remove after first login

      # ── Email — MailerSend ───────────────────────────────────────
      - key: MAILERSEND_API_KEY
        sync: false
      - key: MAILERSEND_FROM_EMAIL
        sync: false
      - key: MAILERSEND_FROM_NAME
        value: "MyPortfolioHub"
      - key: SUPERADMIN_REPLY_TO_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        value: "MyPortfolioHub"
      - key: RESEND_FROM_EMAIL
        sync: false

      # ── Supabase (optional) ──────────────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false

      # ── OAuth — optional social sign-in ───────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # ── App URL / Custom Domains ───────────────────────────────
      - key: APP_BASE_URL
        sync: false
      - key: CUSTOM_DOMAIN_CNAME_TARGET
        sync: false
      - key: CUSTOM_DOMAIN_BLOCKED_HOSTS
        sync: false
      - key: CUSTOM_DOMAIN_PUBLIC_SCHEME
        value: https

      # ── Billing ──────────────────────────────────────────────────
      - key: BILLING_GRACE_PERIOD_DAYS
        value: "3"

      # FIX: PAYMONGO_ENABLED=false means PAYMONGO_SECRET_KEY and
      # PAYMONGO_WEBHOOK_SECRET are NOT required at startup.
      # Change to "true" and set the keys below when enabling billing.
      - key: PAYMONGO_ENABLED
        value: "false"
      # Ledger reporting excludes test-mode transactions. Change this to
      # "live" only when the matching live API keys and webhook are installed.
      - key: PAYMONGO_MODE
        value: "test"
      - key: PAYMONGO_PUBLIC_KEY
        sync: false
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false

      # ── Forms ────────────────────────────────────────────────────
      - key: WEB3FORMS_ACCESS_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # ── Scheduler ───────────────────────────────────────────────
      - key: ENABLE_SCHEDULER
        value: "true"

      # ── Monitoring ───────────────────────────────────────────────
      - key: BETTERSTACK_HEARTBEAT_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SELF_PING_ENABLED
        value: "true"
      - key: SELF_PING_INTERVAL
        value: "60"

  # ── Redis ────────────────────────────────────────────────────────────────
  - type: keyvalue
    name: portfolio-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    # Private-network access only; block public Key Value connections.
    ipAllowList: []
