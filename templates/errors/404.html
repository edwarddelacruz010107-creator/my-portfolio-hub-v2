<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    :root {
      --bg: #080a0f; --bg-2: #12161e; --bg-3: #1a1f2e;
      --text: #e8eaf0; --text-muted: #7a8094; --text-dim: #4a5068;
      --accent: #6366f1; --accent-light: #818cf8; --accent-glow: rgba(99,102,241,0.25);
      --border: rgba(255,255,255,0.07); --border-light: rgba(255,255,255,0.12);
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    html[data-theme="light"] {
      --bg: #f8fafc; --bg-2: #ffffff; --bg-3: #f1f5f9;
      --text: #0f172a; --text-muted: #475569; --text-dim: #94a3b8;
      --border: rgba(15,23,42,0.08); --border-light: rgba(15,23,42,0.12);
      --accent-glow: rgba(99,102,241,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .error-wrap { max-width: 480px; width: 100%; }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
    }
    .error-icon-wrap {
      width: 72px; height: 72px; border-radius: 18px;
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
      display: grid; place-items: center; margin: 0 auto 1.5rem;
      color: var(--accent-light); font-size: 2rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 800;
      color: var(--text); margin-bottom: 0.75rem;
    }
    p {
      color: var(--text-muted); font-size: 0.95rem;
      line-height: 1.65; margin-bottom: 2rem;
    }
    .btn-group { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; border-radius: 10px;
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.9rem; text-decoration: none;
      transition: all var(--transition);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff; box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
    .btn-ghost {
      background: var(--bg-2); border: 1px solid var(--border-light);
      color: var(--text-muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent-light); transform: translateY(-1px); }
    .theme-toggle {
      position: fixed; top: 1.25rem; right: 1.25rem;
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--bg-2); border: 1px solid var(--border);
      display: grid; place-items: center; color: var(--text-muted);
      cursor: pointer; transition: all var(--transition); z-index: 100;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent-light); }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <iconify-icon icon="lucide:moon" width="16" id="moonIcon"></iconify-icon>
    <iconify-icon icon="lucide:sun" width="16" id="sunIcon" style="display:none"></iconify-icon>
  </button>
  <div class="error-wrap">
    <div class="error-icon-wrap">
      <iconify-icon icon="lucide:map-pin-off" width="32"></iconify-icon>
    </div>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Double-check the URL or head back home.</p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        <iconify-icon icon="lucide:home" width="15"></iconify-icon>
        Go Home
      </a>
      <a href="javascript:history.back()" class="btn btn-ghost">
        <iconify-icon icon="lucide:arrow-left" width="15"></iconify-icon>
        Go Back
      </a>
    </div>
  </div>
  <script>
    const THEME_KEY = 'portfolio-theme';
    function initTheme() {
      const t = localStorage.getItem(THEME_KEY) || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('moonIcon').style.display = t === 'dark' ? 'inline-block' : 'none';
      document.getElementById('sunIcon').style.display = t === 'light' ? 'inline-block' : 'none';
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(THEME_KEY, next);
      document.getElementById('moonIcon').style.display = next === 'dark' ? 'inline-block' : 'none';
      document.getElementById('sunIcon').style.display = next === 'light' ? 'inline-block' : 'none';
    }
    initTheme();
  </script>
</body>
</html>
